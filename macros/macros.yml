version: 2

macros:
  - name: test_phone_format
    description: >
      Generic test that asserts a column's non-null values match the format
      NNN-NNN-NNNN (three digits, hyphen, three digits, hyphen, four digits).
      Null values are excluded from the check and are not considered failures.
      Used on: customers_seed.phone.
    arguments:
      - name: model
        type: relation
        description: "The model or seed being tested."
      - name: column_name
        type: column
        description: "The column containing phone numbers to validate."

  - name: test_promo_code_format
    description: >
      Generic test that asserts a column's non-null values contain only
      alphanumeric characters (A-Z, a-z, 0-9) with no spaces or special
      characters. Null values are excluded from the check — most orders have
      no promo code and that is expected.
      Used on: orders_seed.promo_code.
    arguments:
      - name: model
        type: relation
        description: "The model or seed being tested."
      - name: column_name
        type: column
        description: "The column containing promo codes to validate."

  - name: test_valid_us_state
    description: >
      Generic test that asserts a column's non-null values are one of the 50
      official US state two-letter abbreviations (e.g. NY, CA, TX). Null values
      are excluded — online/mobile stores and non-US customers may have no state.
      Used on: customers_seed.state, stores_seed.state.
    arguments:
      - name: model
        type: relation
        description: "The model or seed being tested."
      - name: column_name
        type: column
        description: "The column containing state abbreviations to validate."

  - name: test_price_positive
    description: >
      Generic test that asserts a column's price should be positive.
      Used on: stg_order_items.unit_price, stg_products.unit_price, stg_products.cost_price
    arguments:
      - name: model
        type: relation
        description: "The model or seed being tested."
      - name: column_name
        type: column
        description: "The column containing price values to validate."

  - name: dynamic_total_sales
    description: >
      Utility macro that renders a SUM aggregation expression with a configurable
      column name and alias. Defaults to summing the literal 1 (row count) aliased
      as total_sales. Pass column_name to aggregate a numeric column and alias to
      override the output column name.
      Used on: fact models that require a flexible total-sales aggregation.
    arguments:
      - name: column_name
        type: column
        description: "The numeric column to sum. Defaults to '1' (row count)."
      - name: alias
        type: string
        description: "The alias for the resulting SUM expression. Defaults to 'total_sales'."
