name: "dbt_retail_pipeline"
version: "1.0.0"
config-version: 2

profile: "dbt_retail_pipeline"

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

seeds:
  dbt_retail_pipeline:
    +schema: raw
    +tags: ["seeds"]
    +docs:
      show: true

models:
  dbt_retail_pipeline:
    staging:
      +materialized: view
      +schema: staging
      +tags: ["staging"]
      +docs:
        show: true
    dimensions:
      +materialized: table
      +schema: marts
      +tags: ["dimensions"]
      +docs:
        show: true
    facts:
      +materialized: table
      +schema: marts
      +tags: ["facts"]
      +docs:
        show: true
