name: dbt CI

on:
  push:
    branches: [develop]
  pull_request:
    branches: [develop]
  workflow_dispatch:

jobs:
  dbt-ci:
    name: Run dbt CI (${{ matrix.target }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        target: [dev, qa]

    services:
      postgres:
        image: postgres:15
        ports:
          - "5441:5432"
        env:
          POSTGRES_USER: ci_user
          POSTGRES_PASSWORD: ci_password
          POSTGRES_DB: retail_${{ matrix.target }}
        options: >-
          --health-cmd="pg_isready -U ci_user"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DBT_PROFILES_DIR: .github/profiles

      DBT_USER: ${{ secrets.DBT_USER }}
      DEV_DB_PASSWORD: ${{ secrets.DEV_DB_PASSWORD }}
      QA_DB_PASSWORD: ${{ secrets.QA_DB_PASSWORD }}
      PROD_DB_PASSWORD: ${{ secrets.PROD_DB_PASSWORD }}

      CI_DB_USER: ci_user
      CI_DB_PASSWORD: ci_password

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install dbt packages
        run: dbt deps
      - name: Initialize check run
        uses: actions/github-script@v7
        with:
          script: "core.notice('dbt CI started for target: ${{ matrix.target }}')"

      - name: Debug env
        run: env | sort

      - name: Run dbt build
        run: |
          TARGET="${{ matrix.target }}"
          echo "Running dbt build with target: \"$TARGET\""
          set -o pipefail
          dbt build --profiles-dir "${{ github.workspace }}/.github/profiles" --target "$TARGET" | tee dbt_output_${{ matrix.target }}.log

      - name: Upload dbt log
        uses: actions/upload-artifact@v4
        with:
          name: dbt-log-${{ matrix.target }}
          path: dbt_output_${{ matrix.target }}.log

      - name: Finalize check run (success)
        if: ${{ success() }}
        uses: actions/github-script@v7
        with:
          script: "core.notice('dbt CI completed successfully for target: ${{ matrix.target }}')"
      - name: Finalize check run (failure)
        if: ${{ failure() }}
        uses: actions/github-script@v7
        with:
          script: "core.error('dbt CI failed for target: ${{ matrix.target }} — review logs')"
      - name: Finalize check run (always)
        if: ${{ always() }}
        uses: actions/github-script@v7
        with:
          script: "core.info('dbt CI workflow finished for target: ${{ matrix.target }}')"
