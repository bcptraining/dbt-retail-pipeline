name: dbt CI

on:
  workflow_dispatch:
  push:
    branches:
      - develop
  pull_request:
    branches:
      - develop

jobs:
  dbt-ci:
    name: Run dbt CI
    runs-on: ubuntu-latest

    env:
      DBT_PROFILES_DIR: ./
      DEV_DB_PASSWORD: ${{ secrets.DEV_DB_PASSWORD }}
      PROD_DB_PASSWORD: ${{ secrets.PROD_DB_PASSWORD }}

    steps:
      # -----------------------------
      # Checkout & Python Setup
      # -----------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # -----------------------------
      # dbt Dependencies
      # -----------------------------
      - name: Install dbt packages
        run: dbt deps

      # -----------------------------
      # Initialize Check Run
      # -----------------------------
      - name: Initialize check run
        uses: actions/github-script@v7
        with:
          script: |
            core.notice('dbt CI started')

      # -----------------------------
      # dbt Build
      # -----------------------------
      - name: Run dbt build
        run: dbt build --profiles-dir . --target dev

      # -----------------------------
      # Success Handler
      # -----------------------------
      - name: Finalize check run (success)
        if: ${{ success() }}
        uses: actions/github-script@v7
        with:
          script: |
            core.notice('dbt CI completed successfully')

      # -----------------------------
      # Failure Handler
      # -----------------------------
      - name: Finalize check run (failure)
        if: ${{ failure() }}
        uses: actions/github-script@v7
        with:
          script: |
            core.error('dbt CI failed — review logs for details')

      # -----------------------------
      # Always-Run Final Log
      # -----------------------------
      - name: Finalize check run (always)
        if: ${{ always() }}
        uses: actions/github-script@v7
        with:
          script: |
            core.info('dbt CI workflow finished (success, failure, or cancelled)')
