name: dbt CI

on:
  push:
    branches: [develop]
  pull_request:
    branches: [develop]
  workflow_dispatch:
    inputs:
      target_env:
        description: "dbt target to run (manual only)"
        required: true
        default: "dev"
        type: choice
        options: [dev, qa]

jobs:
  dbt-ci:
    name: Run dbt CI
    runs-on: ubuntu-latest

    env:
      DBT_PROFILES_DIR: ./
      DEV_DB_PASSWORD: ${{ secrets.DEV_DB_PASSWORD }}
      QA_DB_PASSWORD: ${{ secrets.QA_DB_PASSWORD }}
      PROD_DB_PASSWORD: ${{ secrets.PROD_DB_PASSWORD }}

    steps:
      # -----------------------------
      # Checkout & Python Setup
      # -----------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # -----------------------------
      # dbt Dependencies
      # -----------------------------
      - name: Install dbt packages
        run: dbt deps

      # -----------------------------
      # Initialize Check Run
      # -----------------------------
      - name: Initialize check run
        uses: actions/github-script@v7
        with:
          script: core.notice('dbt CI started')

      # -----------------------------
      # dbt Build (Environment-Aware)
      # -----------------------------
      - name: Run dbt build
        run: |
          # Determine target environment
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TARGET="${{ github.event.inputs.target_env }}"
          else
            TARGET="dev"
          fi

          echo "Running dbt build with target: \"$TARGET\""  

          set -o pipefail
          dbt build --profiles-dir . --target "$TARGET" | tee dbt_output.log

      # -----------------------------
      # Upload Logs
      # -----------------------------
      - name: Upload dbt log
        uses: actions/upload-artifact@v4
        with:
          name: dbt-log
          path: dbt_output.log

      # -----------------------------
      # Success Handler
      # -----------------------------
      - name: Finalize check run (success)
        if: ${{ success() }}
        uses: actions/github-script@v7
        with:
          script: core.notice('dbt CI completed successfully')

      # -----------------------------
      # Failure Handler
      # -----------------------------
      - name: Finalize check run (failure)
        if: ${{ failure() }}
        uses: actions/github-script@v7
        with:
          script: core.error('dbt CI failed — review logs for details')

      # -----------------------------
      # Always-Run Final Log
      # -----------------------------
      - name: Finalize check run (always)
        if: ${{ always() }}
        uses: actions/github-script@v7
        with:
          script: core.info('dbt CI workflow finished')
