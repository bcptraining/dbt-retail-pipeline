name: dbt CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  dbt-build:
    runs-on: ubuntu-latest
    env:
      DEV_DB_PASSWORD: ${{ secrets.DEV_DB_PASSWORD || format('ci-{0}', github.run_id) }}
      QA_DB_PASSWORD: ${{ secrets.QA_DB_PASSWORD || format('ci-{0}', github.run_id) }}
      PROD_DB_PASSWORD: ${{ secrets.PROD_DB_PASSWORD || format('ci-{0}', github.run_id) }}
      DBT_USER: ci

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dbt
        run: |
          python -m pip install --upgrade pip
          python -m pip install "dbt-core<2.0.0" "dbt-postgres<2.0.0"

      - name: Verify dbt executable
        run: |
          which dbt || true
          dbt --version
          python --version
          pip --version

      - name: Create dbt profile
        run: |
          mkdir -p ~/.dbt
          cp profiles.yml.example ~/.dbt/profiles.yml

      - name: Start local Postgres
        run: |
          docker compose up -d pg_dev

      - name: Wait for Postgres to be ready
        run: |
          for i in {1..30}; do
            if docker exec pg_dev pg_isready -U dbt_user -d retail_dev; then
              echo "Postgres is ready"
              break
            fi
            echo "Waiting for Postgres..."
            sleep 2
          done

      - name: Run dbt build
        run: |
          dbt debug --target dev
          dbt build --target dev

      - name: Upload dbt artifacts (logs + target)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dbt-artifacts
          path: |
            logs
            target
