name: dbt CI

on:
  push:
    branches: [develop]
  pull_request:
    branches: [develop]
  workflow_dispatch:
    inputs:
      target_env:
        description: "dbt target to run (manual only)"
        required: true
        default: "dev"
        type: choice
        options: [dev, qa]

jobs:
  dbt-ci:
    name: Run dbt CI
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        ports:
          - "5441:5432"
        env:
          POSTGRES_USER: ${{ secrets.DBT_USER }}
          POSTGRES_PASSWORD: ${{ secrets.QA_DB_PASSWORD }}
          POSTGRES_DB: retail_qa
        options: >-
          --health-cmd="pg_isready -U ${{ secrets.DBT_USER }}"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DBT_PROFILES_DIR: .github/profiles
      DBT_USER: ${{ secrets.DBT_USER }}
      DEV_DB_PASSWORD: ${{ secrets.DEV_DB_PASSWORD }}
      QA_DB_PASSWORD: ${{ secrets.QA_DB_PASSWORD }}
      PROD_DB_PASSWORD: ${{ secrets.PROD_DB_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install dbt packages
        run: dbt deps

      - name: Initialize check run
        uses: actions/github-script@v7
        with:
          script: core.notice('dbt CI started')

      - name: Run dbt build
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TARGET="${{ github.event.inputs.target_env }}"
          else
            TARGET="dev"
          fi

          echo "Running dbt build with target: \"$TARGET\""

          set -o pipefail
          dbt build --profiles-dir "${{ github.workspace }}/.github/profiles" --target "$TARGET" | tee dbt_output.log

      - name: Upload dbt log
        uses: actions/upload-artifact@v4
        with:
          name: dbt-log
          path: dbt_output.log

      - name: Finalize check run (success)
        if: ${{ success() }}
        uses: actions/github-script@v7
        with:
          script: core.notice('dbt CI completed successfully')

      - name: Finalize check run (failure)
        if: ${{ failure() }}
        uses: actions/github-script@v7
        with:
          script: core.error('dbt CI failed — review logs for details')

      - name: Finalize check run (always)
        if: ${{ always() }}
        uses: actions/github-script@v7
        with:
          script: core.info('dbt CI workflow finished')
