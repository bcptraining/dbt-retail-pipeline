version: 2

models:
  - name: fct_order_items
    description: >
      Order line-item fact table at order-item grain. One row per line item.
      Joins stg_order_items and stg_orders to dim_customers, dim_products,
      and dim_stores. Contains all measures for revenue and margin analysis.
      KPIs supported: gross and net revenue by product/category/brand/channel/
      segment/store; discount amount and discount rate; gross and net margin
      by product and category; promo code attach rate; units sold.
    columns:
      - name: order_item_id
        description: "Primary key. Unique integer identifier for each line item."
        tests:
          - not_null
          - unique

      - name: order_id
        description: "Foreign key to fct_orders."
        tests:
          - not_null

      - name: customer_id
        description: "Foreign key to dim_customers."
        tests:
          - not_null
          - relationships:
              to: ref('dim_customers')
              field: customer_id

      - name: product_id
        description: "Foreign key to dim_products."
        tests:
          - not_null
          - relationships:
              to: ref('dim_products')
              field: product_id

      - name: store_id
        description: "Foreign key to dim_stores."
        tests:
          - not_null
          - relationships:
              to: ref('dim_stores')
              field: store_id

      - name: date_key
        description: "Order date. Foreign key to dim_date."
        tests:
          - not_null
          - relationships:
              to: ref('dim_date')
              field: date_key

      - name: order_year
        description: "Derived from order_date. Extracted year of the order."

      - name: order_status
        description: "Fulfillment status of the parent order."

      - name: channel
        description: "Sales channel: 'web' | 'store' | 'mobile'."

      - name: promo_code
        description: "Promotional code applied at checkout. Nullable."

      - name: customer_segment
        description: "Denormalized from dim_customers."

      - name: product_category
        description: "Denormalized from dim_products."

      - name: product_subcategory
        description: "Denormalized from dim_products."

      - name: product_brand
        description: "Denormalized from dim_products."

      - name: store_type
        description: "Denormalized from dim_stores."

      - name: store_country
        description: "Denormalized from dim_stores."

      - name: quantity
        description: "Number of units purchased on this line."
        tests:
          - not_null

      - name: unit_price
        description: "Price per unit charged at time of sale."
        tests:
          - not_null

      - name: discount_amount
        description: "Total dollar discount applied to this line item."
        tests:
          - not_null

      - name: gross_amount
        description: "Derived: quantity * unit_price."

      - name: net_amount
        description: "Derived: (quantity * unit_price) - discount_amount."

      - name: unit_margin
        description: "Derived: unit_price - cost_price."

      - name: net_margin
        description: "Derived: (quantity * (unit_price - cost_price)) - discount_amount."

  - name: fct_orders
    description: >
      Order-grain fact view aggregated from fct_order_items. One row per order.
      KPIs supported: order count; average order value (AOV); total revenue
      and net margin per order; discount rate; line items per order; orders
      by status; promo code attach rate; revenue and order count by channel,
      store type, customer segment, and date.
    columns:
      - name: order_id
        description: "Primary key. Unique integer identifier for each order."
        tests:
          - not_null
          - unique

      - name: customer_id
        description: "Foreign key to dim_customers."
        tests:
          - not_null
          - relationships:
              to: ref('dim_customers')
              field: customer_id

      - name: store_id
        description: "Foreign key to dim_stores."
        tests:
          - not_null
          - relationships:
              to: ref('dim_stores')
              field: store_id

      - name: date_key
        description: "Order date. Foreign key to dim_date."
        tests:
          - not_null
          - relationships:
              to: ref('dim_date')
              field: date_key

      - name: order_status
        description: "Fulfillment status."

      - name: channel
        description: "Sales channel."

      - name: promo_code
        description: "Promotional code applied at checkout."

      - name: customer_segment
        description: "Denormalized from dim_customers."

      - name: store_type
        description: "Denormalized from dim_stores."

      - name: store_country
        description: "Denormalized from dim_stores."

      - name: line_item_count
        description: "Number of distinct line items in the order."

      - name: total_quantity
        description: "Sum of units purchased across all line items."

      - name: total_gross_amount
        description: "Sum of gross_amount across all line items."

      - name: total_discount_amount
        description: "Sum of discount_amount across all line items."

      - name: total_net_amount
        description: "Sum of net_amount across all line items."

      - name: total_net_margin
        description: "Sum of net_margin across all line items."

  - name: fct_payments
    description: >
      Payment fact table at payment grain. One row per payment transaction.
      Joins stg_payments and stg_orders to dim_customers.
      KPIs supported: payment method mix; refund and void rates; payment volume;
      settlement timing; customer lifetime payment value.
    columns:
      - name: payment_id
        description: "Primary key. Unique integer identifier for each payment."
        tests:
          - not_null
          - unique

      - name: order_id
        description: "Foreign key to fct_orders."
        tests:
          - not_null
          - relationships:
              to: ref('fct_orders')
              field: order_id

      - name: customer_id
        description: "Foreign key to dim_customers."
        tests:
          - not_null
          - relationships:
              to: ref('dim_customers')
              field: customer_id

      - name: store_id
        description: "Foreign key to dim_stores."
        tests:
          - not_null
          - relationships:
              to: ref('dim_stores')
              field: store_id

      - name: date_key
        description: "Payment date. Foreign key to dim_date."
        tests:
          - not_null
          - relationships:
              to: ref('dim_date')
              field: date_key

      - name: payment_method
        description: "Payment method."

      - name: payment_status
        description: "Payment status."

      - name: channel
        description: "Sales channel of the parent order."

      - name: customer_segment
        description: "Denormalized from dim_customers."

      - name: payment_amount
        description: "Dollar amount of this payment transaction."
        tests:
          - not_null

      - name: days_to_payment
        description: "Derived: payment_date - order_date."

  - name: fct_web_sessions
    description: >
      Web session fact table at session grain. One row per browsing session.
      customer_id and product dimension columns are null for unauthenticated
      sessions or sessions without a product view.
    columns:
      - name: session_id
        description: "Primary key. Unique integer identifier for each session."
        tests:
          - not_null
          - unique

      - name: customer_id
        description: "Foreign key to dim_customers."
        tests:
          - relationships:
              to: ref('dim_customers')
              field: customer_id

      - name: product_id_viewed
        description: "Foreign key to dim_products."
        tests:
          - relationships:
              to: ref('dim_products')
              field: product_id

      - name: date_key
        description: "Session date. Foreign key to dim_date."
        tests:
          - not_null
          - relationships:
              to: ref('dim_date')
              field: date_key

      - name: channel
        description: "Marketing channel."

      - name: device_type
        description: "Device used."

      - name: customer_segment
        description: "Denormalized from dim_customers."

      - name: product_category_viewed
        description: "Denormalized from dim_products."

      - name: product_subcategory_viewed
        description: "Denormalized from dim_products."

      - name: product_brand_viewed
        description: "Denormalized from dim_products."

      - name: pages_viewed
        description: "Number of pages viewed."

      - name: converted
        description: "Whether the session resulted in a purchase."

      - name: converted_flag
        description: "Derived: converted cast to integer."

  - name: fct_inventory
    description: >
      Inventory snapshot fact table at product-store grain. One row per
      inventory record. Joins stg_inventory to dim_products and dim_stores.
      Supports stock level monitoring, reorder alerts, and inventory valuation.
    columns:
      - name: inventory_id
        description: "Primary key. Unique integer identifier for each inventory record."
        tests:
          - not_null
          - unique

      - name: product_id
        description: "Foreign key to dim_products."
        tests:
          - not_null
          - relationships:
              to: ref('dim_products')
              field: product_id

      - name: store_id
        description: "Foreign key to dim_stores."
        tests:
          - not_null
          - relationships:
              to: ref('dim_stores')
              field: store_id

      - name: date_key
        description: "Restock date. Foreign key to dim_date."
        tests:
          - not_null
          - relationships:
              to: ref('dim_date')
              field: date_key

      - name: product_name
        description: "Denormalized from dim_products."

      - name: product_category
        description: "Denormalized from dim_products."

      - name: product_subcategory
        description: "Denormalized from dim_products."

      - name: product_brand
        description: "Denormalized from dim_products."

      - name: cost_price
        description: "Unit cost used for inventory valuation."

      - name: store_name
        description: "Denormalized from dim_stores."

      - name: store_type
        description: "Denormalized from dim_stores."

      - name: store_city
        description: "Denormalized from dim_stores."

      - name: store_state
        description: "Denormalized from dim_stores."

      - name: quantity_on_hand
        description: "Current units in stock."
        tests:
          - not_null

      - name: reorder_level
        description: "Threshold below which a restock should be triggered."
        tests:
          - not_null

      - name: below_reorder_flag
        description: "Derived: 1 if quantity_on_hand < reorder_level."

      - name: units_needed
        description: "Derived: MAX(reorder_level - quantity_on_hand, 0)."

      - name: inventory_value
        description: "Derived: quantity_on_hand * cost_price."
