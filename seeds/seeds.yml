version: 2

seeds:
  - name: customers_seed
    description: >
      Raw customer profile records loaded from source CSV. Each row represents
      a unique registered customer, including contact details, geographic
      location, and value-based segment assignment. Covers customers across
      USA, Canada, and UK.
    config:
      column_types:
        customer_id: integer
        signup_date: date
    columns:
      - name: customer_id
        description: "Unique integer identifier for each customer. Primary key."
        tests:
          - not_null
          - unique

      - name: first_name
        description: "Customer's given name."

      - name: last_name
        description: "Customer's family name."

      - name: email
        description: "Customer's email address."

      - name: phone
        description: "Customer's contact phone number. Expected format: 999-999-9999."
        tests:
          - phone_format

      - name: city
        description: "City of the customer's primary mailing address."
        tests:
          - not_null

      - name: state
        description: "Two-letter US state or Canadian province abbreviation."
        tests:
          - not_null
          - valid_us_state

      - name: country
        description: "Country of the customer's primary address."
        tests:
          - accepted_values:
              values: ["USA", "Canada", "UK"]

      - name: signup_date
        description: "Date the customer registered their account."
        tests:
          - not_null

      - name: customer_segment
        description: "Tier-based value segment: Premium, Standard, or Budget."
        tests:
          - accepted_values:
              values: ["Premium", "Standard", "Budget"]

  - name: inventory_seed
    description: >
      Point-in-time snapshot of product stock levels across store locations.
      Each row tracks the current quantity on hand for a product at a specific
      store, along with the reorder threshold and next scheduled restock date.
    config:
      column_types:
        inventory_id: integer
        product_id: integer
        store_id: integer
        quantity_on_hand: integer
        reorder_level: integer
        restock_date: date
    columns:
      - name: inventory_id
        description: "Unique integer identifier for each inventory record. Primary key."
        tests:
          - not_null
          - unique

      - name: product_id
        description: "Foreign key to products_seed."
        tests:
          - relationships:
              to: ref('products_seed')
              field: product_id

      - name: store_id
        description: "Foreign key to stores_seed."
        tests:
          - relationships:
              to: ref('stores_seed')
              field: store_id

      - name: quantity_on_hand
        description: "Current number of units available at the store."

      - name: reorder_level
        description: "Minimum stock quantity that triggers a restock."

      - name: restock_date
        description: "Next scheduled restock date."

  - name: order_items_seed
    description: >
      Line-item detail records for each order. Each row represents a single
      product within an order, capturing quantity purchased, unit price, and
      any discount applied.
    config:
      column_types:
        order_item_id: integer
        order_id: integer
        product_id: integer
        quantity: integer
        unit_price: numeric(10,2)
        discount_amount: numeric(10,2)
    columns:
      - name: order_item_id
        description: "Unique integer identifier for each order line item. Primary key."
        tests:
          - not_null
          - unique

      - name: order_id
        description: "Foreign key to orders_seed."
        tests:
          - not_null
          - relationships:
              to: ref('orders_seed')
              field: order_id

      - name: product_id
        description: "Foreign key to products_seed."
        tests:
          - not_null
          - relationships:
              to: ref('products_seed')
              field: product_id

      - name: quantity
        description: "Number of units purchased."
        tests:
          - not_null

      - name: unit_price
        description: "Price per unit charged at purchase time."
        tests:
          - not_null

      - name: discount_amount
        description: "Total discount applied to this line item."
        tests:
          - not_null

  - name: orders_seed
    description: >
      Transaction header records representing customer orders. Each row is a
      single order placed by a customer through a specific channel and store.
    config:
      column_types:
        order_id: integer
        customer_id: integer
        store_id: integer
        order_date: date
    columns:
      - name: order_id
        description: "Unique integer identifier for each order. Primary key."
        tests:
          - not_null
          - unique

      - name: customer_id
        description: "Foreign key to customers_seed."
        tests:
          - not_null
          - relationships:
              to: ref('customers_seed')
              field: customer_id

      - name: store_id
        description: "Foreign key to stores_seed."
        tests:
          - not_null
          - relationships:
              to: ref('stores_seed')
              field: store_id

      - name: order_date
        description: "Date the order was placed."
        tests:
          - not_null

      - name: order_status
        description: "Fulfillment status."
        tests:
          - accepted_values:
              values: ["Completed", "Returned", "Cancelled", "Shipped"]

      - name: channel
        description: "Sales channel: web, store, or mobile."
        tests:
          - not_null
          - accepted_values:
              values: ["web", "store", "mobile"]

      - name: promo_code
        description: "Promotional code applied at checkout."
        tests:
          - promo_code_format

  - name: payments_seed
    description: >
      Payment transaction records linked to customer orders. Each row captures
      a single payment event including method, status, and amount collected.
    config:
      column_types:
        payment_id: integer
        order_id: integer
        payment_date: date
        amount: numeric(10,2)
    columns:
      - name: payment_id
        description: "Unique integer identifier for each payment. Primary key."
        tests:
          - not_null
          - unique

      - name: order_id
        description: "Foreign key to orders_seed."
        tests:
          - not_null
          - relationships:
              to: ref('orders_seed')
              field: order_id

      - name: payment_date
        description: "Date the payment was processed."
        tests:
          - not_null

      - name: payment_method
        description: "Payment method."
        tests:
          - not_null
          - accepted_values:
              values:
                ["credit_card", "cash", "paypal", "debit_card", "store_credit"]

      - name: payment_status
        description: "Payment status."
        tests:
          - not_null
          - accepted_values:
              values: ["Pending", "Completed", "Refunded", "Voided"]

      - name: amount
        description: "Dollar amount of this payment."
        tests:
          - not_null

  - name: products_seed
    description: >
      Product catalog records containing attributes for all sellable items.
      Includes pricing, categorization, brand, and cost information.
    config:
      column_types:
        product_id: integer
        unit_price: numeric(10,2)
        cost_price: numeric(10,2)
    columns:
      - name: product_id
        description: "Unique integer identifier for each product. Primary key."
        tests:
          - not_null
          - unique

      - name: product_name
        description: "Human-readable product name."

      - name: category
        description: "Top-level product classification."
        tests:
          - not_null
          - accepted_values:
              values:
                [
                  "Footwear",
                  "Electronics",
                  "Apparel",
                  "Sports",
                  "Accessories",
                  "Furniture",
                  "Home Appliances",
                  "Personal Care",
                ]

      - name: subcategory
        description: "Secondary classification."

      - name: brand
        description: "Manufacturer or brand name."

      - name: unit_price
        description: "Retail selling price per unit."
        tests:
          - not_null

      - name: cost_price
        description: "Wholesale cost per unit."
        tests:
          - not_null

  - name: stores_seed
    description: >
      Store master data for all retail locations and sales channels.
    config:
      column_types:
        store_id: integer
        opened_date: date
    columns:
      - name: store_id
        description: "Unique integer identifier for each store or channel. Primary key."
        tests:
          - not_null
          - unique

      - name: store_name
        description: "Human-readable store name."

      - name: store_type
        description: "Store format: physical, online, or mobile."
        tests:
          - not_null
          - accepted_values:
              values: ["physical", "online", "mobile"]

      - name: city
        description: "City where the store is located."

      - name: state
        description: "Two-letter US state abbreviation."
        tests:
          - valid_us_state

      - name: country
        description: "Country where the store operates."
        tests:
          - not_null
          - accepted_values:
              values: ["USA", "Canada", "UK"]

      - name: opened_date
        description: "Date the store opened or channel launched."
        tests:
          - not_null

  - name: web_activity_seed
    description: >
      Website session-level behavioral data capturing customer browsing activity.
    config:
      column_types:
        session_id: integer
        customer_id: integer
        pages_viewed: integer
        product_id_viewed: integer
        session_date: date
    columns:
      - name: session_id
        description: "Unique integer identifier for each web session. Primary key."
        tests:
          - not_null
          - unique

      - name: customer_id
        description: "Foreign key to customers_seed. Null for anonymous sessions."
        tests:
          - relationships:
              to: ref('customers_seed')
              field: customer_id

      - name: session_date
        description: "Date the browsing session occurred."
        tests:
          - not_null

      - name: pages_viewed
        description: "Total number of pages viewed."
        tests:
          - not_null

      - name: product_id_viewed
        description: "Product viewed during the session."
        tests:
          - not_null

      - name: channel
        description: "Marketing channel."
        tests:
          - not_null
          - accepted_values:
              values:
                [
                  "organic_search",
                  "direct",
                  "email",
                  "paid_search",
                  "social_media",
                ]

      - name: device_type
        description: "Device category used."
        tests:
          - not_null
          - accepted_values:
              values: ["desktop", "mobile", "tablet"]

      - name: converted
        description: "Whether the session resulted in a purchase."
